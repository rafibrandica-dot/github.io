<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SkillRise Academy</title>

<style>
body {
  font-family: Arial;
  background: #f9f6f0;
  margin: 0;
}

.container {
  max-width: 900px;
  margin: auto;
  padding: 20px;
}

.player {
  width: 100%;
  height: 500px;
  margin-bottom: 20px;
}

iframe {
  width: 100%;
  height: 100%;
  border-radius: 12px;
  border: none;
}

.video-grid {
  display: grid;
  grid-template-columns: repeat(2, 1fr);
  gap: 15px;
}

.video {
  cursor: pointer;
  background: white;
  padding: 10px;
  border-radius: 12px;
  transition: 0.3s;
}

.video:hover {
  transform: scale(1.03);
}

.video.active {
  border: 2px solid #4E7A62;
}

.video img {
  width: 100%;
  border-radius: 8px;
}

.title {
  margin-top: 8px;
  font-weight: bold;
}
</style>
</head>

<body>

<div class="container">

  <!-- MAIN PLAYER -->
  <div class="player">
    <iframe id="player"
      src="https://www.youtube.com/embed/tgbNymZ7vqY?rel=0&modestbranding=1&enablejsapi=1&origin="
      allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture"
      allowfullscreen>
    </iframe>
  </div>

  <!-- VIDEO LIST -->
  <div class="video-grid">

    <div class="video active" onclick="play(this,'tgbNymZ7vqY')">
      <img src="https://img.youtube.com/vi/tgbNymZ7vqY/0.jpg">
      <div class="title">Digital Marketing</div>
    </div>

    <div class="video" onclick="play(this,'ScMzIvxBSi4')">
      <img src="https://img.youtube.com/vi/ScMzIvxBSi4/0.jpg">
      <div class="title">ChatGPT Tutorial</div>
    </div>

    <div class="video" onclick="play(this,'ysz5S6PUM-U')">
      <img src="https://img.youtube.com/vi/ysz5S6PUM-U/0.jpg">
      <div class="title">Dropshipping</div>
    </div>

    <div class="video" onclick="play(this,'dQw4w9WgXcQ')">
      <img src="https://img.youtube.com/vi/dQw4w9WgXcQ/0.jpg">
      <div class="title">Meta Ads</div>
    </div>

  </div>

</div>

<script>
function play(el, videoId) {

  // remove active
  document.querySelectorAll('.video').forEach(v => v.classList.remove('active'));
  el.classList.add('active');

  // FIXED embed URL (prevents Error 153)
  const url =
    "https://www.youtube.com/embed/" +
    videoId +
    "?autoplay=1&rel=0&modestbranding=1&enablejsapi=1&origin=" +
    window.location.origin;

  document.getElementById("player").src = url;
}
</script>

</body>
</html>
